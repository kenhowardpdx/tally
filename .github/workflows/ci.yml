name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # IMPORTANT: "backend-test" and "frontend-test" are required status checks for PRs
  # Do not rename these jobs without updating branch protection rules
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tally
          POSTGRES_PASSWORD: tally
          POSTGRES_DB: tally
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tally"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Test
        env:
          DATABASE_URL_READWRITE: postgresql+asyncpg://tally:tally@localhost:5432/tally
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --all-extras
          poetry run pytest
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: ./frontend/.nvmrc
      - name: Test
        run: |
          yarn install --frozen-lockfile
          yarn test
