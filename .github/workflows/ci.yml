name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # IMPORTANT: "backend-test" and "frontend-test" are required status checks for PRs
  # Do not rename these jobs without updating branch protection rules
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tally
          POSTGRES_PASSWORD: tally
          POSTGRES_DB: tally
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tally"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Test
        env:
          DATABASE_URL_READWRITE: postgresql+asyncpg://tally:tally@localhost:5432/tally
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --all-extras
          poetry run pytest
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version-file: ./frontend/.nvmrc
      - name: Test
        env:
          # Dummy but present: svelte-kit sync generates $env/static/public's
          # ambient types from whatever env vars actually exist at sync time,
          # so svelte-check fails on any var the code imports but this step
          # doesn't set - exactly the gap that let PR #91 merge without
          # PUBLIC_DEV_AUTH_BYPASS wired into deploy-frontend.yml, breaking
          # every deploy until fixed here too. Values don't matter, presence does.
          PUBLIC_AUTH0_DOMAIN: test.auth0.com
          PUBLIC_AUTH0_CLIENT_ID: test-client-id
          PUBLIC_AUTH0_AUDIENCE: https://api.test.example.com
          PUBLIC_API_BASE_URL: http://localhost:8000
          PUBLIC_DEV_AUTH_BYPASS: "false"
        run: |
          yarn install --frozen-lockfile
          yarn run check
          yarn test
