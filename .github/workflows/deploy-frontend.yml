name: Deploy Frontend Assets

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "frontend/build/**"
      - "frontend/package.json"
      - "frontend/vite.config.ts"
      - "frontend/svelte.config.js"
      - "frontend/tsconfig.json"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "prod"
        type: choice
        options:
          - prod

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    # Needed to access environment-scoped secrets (TALLY_AUTH0_*) - without
    # this, secrets.TALLY_AUTH0_* silently resolve to empty strings rather
    # than erroring, which is exactly what shipped a build with an empty
    # Auth0 domain/client_id/audience baked into the static site.
    environment: ${{ github.event.inputs.environment || 'prod' }}
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v5

      - name: Cache Yarn Dependencies
        uses: actions/cache@v6
        with:
          path: ~/.cache/yarn
          key: yarn-${{ runner.os }}-${{ hashFiles('**/yarn.lock') }}

      - name: Check for yarn.lock
        run: |
          if [ ! -f yarn.lock ]; then
            echo "❌ yarn.lock not found. Aborting deployment."
            exit 1
          fi

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Build Assets
        env:
          PUBLIC_AUTH0_DOMAIN: ${{ secrets.TALLY_AUTH0_DOMAIN }}
          PUBLIC_AUTH0_CLIENT_ID: ${{ secrets.TALLY_AUTH0_CLIENT_ID }}
          PUBLIC_AUTH0_AUDIENCE: ${{ secrets.TALLY_AUTH0_AUDIENCE }}
          # Empty: prod frontend and API share an origin via CloudFront's /api/v1/* routing
          # (see infra/main.tf's cloudfront module), so API calls are relative.
          PUBLIC_API_BASE_URL: ""
          # Hardcoded literal, never a secret - must always be false in a
          # deployed build. $env/static/public still requires the key to
          # exist at build time even though the value is fixed here.
          PUBLIC_DEV_AUTH_BYPASS: "false"
        run: yarn build

      - name: Verify Build Output
        run: |
          if [ ! -d build ] || [ -z "$(ls -A build)" ]; then
            echo "❌ Build output missing or empty. Aborting deployment."
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: deploy-frontend-${{ github.run_id }}
          aws-region: us-west-2

      - name: Sync to S3
        env:
          AWS_REGION: us-west-2
        run: |
          cd build
          bucket_name=$(aws s3api list-buckets --region "$AWS_REGION" --query "Buckets[?starts_with(Name, 'tally-frontend-')].Name" --output text)
          if [ -z "$bucket_name" ]; then
            echo "❌ No matching S3 bucket found. Aborting deployment."
            exit 1
          fi
          aws s3 sync . s3://$bucket_name/ --region "$AWS_REGION" --delete || { echo "❌ S3 sync failed."; exit 1; }

      - name: Invalidate CloudFront Cache
        run: |
          alias="tally.kenhoward.dev"
          distribution_ids=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Aliases.Items && contains(Aliases.Items, '${alias}')].Id" \
            --output text)

          # Ensure we got exactly one match (AWS CLI text output is whitespace-separated)
          set -- $distribution_ids
          if [ $# -eq 0 ]; then
            echo "❌ No matching CloudFront distribution found for alias: ${alias}"
            exit 1
          elif [ $# -gt 1 ]; then
            echo "❌ Multiple CloudFront distributions matched alias ${alias}: ${distribution_ids}"
            exit 1
          fi

          aws cloudfront create-invalidation --distribution-id "$1" --paths "/*"
