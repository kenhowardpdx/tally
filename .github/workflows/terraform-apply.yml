name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "backend/alembic/**"
      - "backend/src/**"
      - "backend/pyproject.toml"
      - "backend/poetry.lock"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "prod"
        type: choice
        options:
          - prod

concurrency:
  group: terraform-apply-prod
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'prod' }}
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ./infra

    steps:
      - uses: actions/checkout@v7
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: terraform-apply-${{ github.run_id }}
          aws-region: us-west-2
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/cache@v6
        with:
          path: ./infra/.terraform
          key: terraform-${{ hashFiles('./infra/.terraform.lock.hcl') }}

      - name: Validate
        run: |
          [ -n "$TF_VAR_environment" ] || { echo "TF_VAR_environment required"; exit 1; }
          aws sts get-caller-identity >/dev/null
          terraform fmt -check -recursive
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment || 'prod' }}

      - name: Init
        run: |
          sed "s/__AWS_ACCOUNT_ID__/$AWS_ACCOUNT_ID/g" backend.conf > backend.conf.tmp
          terraform init -backend-config=backend.conf.tmp
          terraform validate
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'prod' }}
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Build & Stage Lambda
        run: |
          pip install poetry poetry-plugin-export --quiet
          poetry -C ../backend export -f requirements.txt --output ../backend/requirements.txt --without-hashes
          # Installed natively on this (Linux x86_64) runner rather than with an explicit
          # --platform tag: different deps publish different manylinux tags (e.g. greenlet
          # ships manylinux_2_28, cffi ships manylinux2014), so forcing one exact tag across
          # all of them fails. A native install picks whatever's compatible per-package, and
          # this runner's glibc is compatible with the Lambda python3.13 (AL2023) runtime.
          pip install --target ../backend/dist -r ../backend/requirements.txt --quiet
          cp -r ../backend/src ../backend/dist/src
          (cd ../backend/dist && zip -r ../../infra/backend.zip . -q)
          rm -rf ../backend/dist ../backend/requirements.txt

          BUCKET="tally-backend-${TF_VAR_environment}-${AWS_ACCOUNT_ID}-us-west-2"
          terraform apply -auto-approve -target=module.backend_s3 \
            -var="aws_account_id=${AWS_ACCOUNT_ID}" -var="environment=${TF_VAR_environment}"
          aws s3 cp backend.zip s3://${BUCKET}/backend.zip
          # backend.zip is kept (not deleted) so the Plan/Apply steps below can hash it
          # via source_code_hash and detect that the Lambda function needs updating.
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'prod' }}
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_database_url_readwrite: ${{ secrets.TALLY_DATABASE_URL_READWRITE }}
          TF_VAR_database_url_readonly: ${{ secrets.TALLY_DATABASE_URL_READONLY }}
          TF_VAR_auth0_domain: ${{ secrets.TALLY_AUTH0_DOMAIN }}
          TF_VAR_auth0_audience: ${{ secrets.TALLY_AUTH0_AUDIENCE }}

      - name: Run DB Migrations
        run: |
          poetry -C ../backend export -f requirements.txt --output ../backend/migrate-requirements.txt \
            --without-hashes --with migrate
          pip install -r ../backend/migrate-requirements.txt --quiet
          (cd ../backend && alembic upgrade head)
          rm -f ../backend/migrate-requirements.txt
        env:
          DATABASE_URL_READWRITE: ${{ secrets.TALLY_DATABASE_URL_READWRITE }}

      - name: Plan
        id: plan
        run: |
          set +e
          terraform plan -out=tfplan -detailed-exitcode
          plan_exit_code=$?
          set -e

          echo "plan_exit_code=$plan_exit_code" >> "$GITHUB_OUTPUT"

          case "$plan_exit_code" in
            0) echo "has_changes=false" >> "$GITHUB_OUTPUT" ;;
            2) echo "has_changes=true" >> "$GITHUB_OUTPUT" ;;
            1) echo "Terraform plan failed" >&2; exit 1 ;;
            *) echo "Unexpected exit code: $plan_exit_code" >&2; exit 1 ;;
          esac
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'prod' }}
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_database_url_readwrite: ${{ secrets.TALLY_DATABASE_URL_READWRITE }}
          TF_VAR_database_url_readonly: ${{ secrets.TALLY_DATABASE_URL_READONLY }}
          TF_VAR_auth0_domain: ${{ secrets.TALLY_AUTH0_DOMAIN }}
          TF_VAR_auth0_audience: ${{ secrets.TALLY_AUTH0_AUDIENCE }}

      - name: Apply
        if: steps.plan.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_environment: ${{ github.event.inputs.environment || 'prod' }}
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
          TF_VAR_database_url_readwrite: ${{ secrets.TALLY_DATABASE_URL_READWRITE }}
          TF_VAR_database_url_readonly: ${{ secrets.TALLY_DATABASE_URL_READONLY }}
          TF_VAR_auth0_domain: ${{ secrets.TALLY_AUTH0_DOMAIN }}
          TF_VAR_auth0_audience: ${{ secrets.TALLY_AUTH0_AUDIENCE }}

      - name: Output
        if: success()
        run: |
          if [[ "${{ steps.plan.outputs.has_changes }}" == "true" ]]; then
            echo "Applied $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            terraform output 2>/dev/null || echo "No outputs"
          else
            echo "No changes needed"
          fi

      - name: Cleanup
        if: failure()
        run: rm -f tfplan
