name: Terraform PR

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v5

      - name: Check for infra changes
        id: infra_changes
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.paginate(
              github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              }
            );
            const infraChanged = files.some(f => f.filename.startsWith('infra/'));
            core.setOutput('noop', infraChanged ? 'false' : 'true');

      - name: No infra changes, noop
        if: steps.infra_changes.outputs.noop == 'true'
        run: echo "No infra changes detected. Skipping Terraform steps."

      - uses: aws-actions/configure-aws-credentials@v4
        if: steps.infra_changes.outputs.noop != 'true'
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - uses: hashicorp/setup-terraform@v3
        if: steps.infra_changes.outputs.noop != 'true'
        with:
          terraform_wrapper: false

      - uses: actions/cache@v4
        if: steps.infra_changes.outputs.noop != 'true'
        with:
          path: .terraform
          key: terraform-${{ hashFiles('.terraform.lock.hcl') }}

      - name: Init
        if: steps.infra_changes.outputs.noop != 'true'
        run: |
          sed "s/__AWS_ACCOUNT_ID__/$TF_VAR_aws_account_id/g" backend.conf > backend.conf.tmp
          terraform init -backend-config=backend.conf.tmp
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Check Formatting
        if: steps.infra_changes.outputs.noop != 'true'
        run: terraform fmt -check -recursive

      - name: Validate
        if: steps.infra_changes.outputs.noop != 'true'
        run: terraform validate
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}

      - name: Plan
        if: steps.infra_changes.outputs.noop != 'true'
        id: plan
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee tfplan.txt
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
        env:
          TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
        continue-on-error: true

      - name: Comment
        if: github.event_name == 'pull_request' && steps.plan.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = '';
            try {
              plan = fs.readFileSync('infra/tfplan.txt', 'utf8');
            } catch (err) {
              plan = 'No plan output';
            }
            const exitCode = '${{ steps.plan.outputs.exit_code }}';
            const status = exitCode === '0' ? '✅ No changes' :
                          exitCode === '2' ? '📋 Changes detected' : '❌ Failed';

            const output = `#### Terraform Plan ${status}
            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan}
            \`\`\`
            </details>`;

            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Terraform Plan')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: output
              });
            }

      - name: Fail Check
        if: steps.plan.outputs.exit_code == '1'
        run: exit 1
